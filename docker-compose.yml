services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fluxhr
      POSTGRES_PASSWORD: fluxhr_secret
      POSTGRES_DB: fluxhr_db
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://fluxhr:fluxhr_secret@postgres:5432/fluxhr_db
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped

  celery:
    build: ./backend
    command: celery -A celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - postgres
    environment:
      DATABASE_URL: postgresql://fluxhr:fluxhr_secret@postgres:5432/fluxhr_db
      REDIS_URL: redis://redis:6379/0
      SMTP_SERVER: mailhog
      SMTP_PORT: 1025
      SMTP_USER: any
      SMTP_PASSWORD: any
      FROM_EMAIL: privacy@fluxhr.local
    restart: unless-stopped

  celery-beat:
    build: ./backend
    command: celery -A celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - postgres
    environment:
      DATABASE_URL: postgresql://fluxhr:fluxhr_secret@postgres:5432/fluxhr_db
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped